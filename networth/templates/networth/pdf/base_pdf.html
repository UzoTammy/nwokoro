<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Networth Report</title>
  <style>
    body {
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      font-size: 13px;
      color: #1e293b;
      margin: 0;
      padding: 15px;
    }

    /* Letterhead */
    .letterhead {
      border-bottom: 3px solid #131b2e;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .letterhead-title {
      font-size: 22px;
      font-weight: bold;
      color: #131b2e;
    }
    .letterhead-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }
    .letterhead-sub {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    /* Sections */
    .section {
      margin-bottom: 18px;
    }
    .section-title {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #64748b;
      border-bottom: 1px solid #cbd5e1;
      padding-bottom: 3px;
      margin-bottom: 8px;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }
    th {
      background-color: #f1f5f9;
      font-size: 11px;
      font-weight: bold;
      padding: 6px 8px;
      border: 1px solid #e2e8f0;
    }
    td {
      padding: 6px 8px;
      border: 1px solid #e2e8f0;
      font-size: 12px;
    }
    tr:nth-child(even) td {
      background-color: #f8fafc;
    }
    .total-row td {
      font-weight: bold;
      background-color: #f1f5f9;
    }

    /* Charts */
    .chart-table { border: none; }
    .chart-table td { border: none; padding: 0 10px; }
    .chart-table img { width: 260px; height: auto; }
    .chart-label {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 4px;
    }

    /* Footer */
    .footer {
      margin-top: 24px;
      border-top: 1px solid #e2e8f0;
      padding-top: 8px;
    }
    .footer-table { border: none; }
    .footer-table td {
      border: none;
      font-size: 10px;
      color: #94a3b8;
      padding: 0;
    }

    /* Utilities */
    .text-left   { text-align: left; }
    .text-center { text-align: center; }
    .text-right  { text-align: right; }
    .text-success { color: #16a34a; }
    .text-danger  { color: #dc2626; }

    .page-break { page-break-before: always; }

    @page {
      size: A4;
      margin: 1.2cm 0.8cm 1.2cm 0.8cm;
    }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
